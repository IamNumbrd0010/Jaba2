<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hot Air Balloon</title>
  <link rel="stylesheet" href="celebration.css">
</head>
<body>

<div class="top-bar">
  <span onclick="goTo('surprise.html')">←</span>
  <h2>Hot Air Balloon 🎈</h2>
</div>

<div class="page-intro">
  <a href="index.html">
    <img src="logo.png" alt="Logo" style="height:40px;">
  </a>
</div>

<div class="page-intro">
  A surprise that floats above the rest 🎈✨
</div>

<section class="section">

  <div class="cake-item" onclick="selectBalloon(30000)">
    <!-- <div class="img"></div> -->
    <h4>Hot Air Balloon Package</h4><br>
    <p>Fully styled surprise setup</p>
    <strong>₦30,000</strong>
  </div>

</section>

<br><br>

<section class="section">
  <h3>Message (optional)</h3>
  <input type="text" id="message" placeholder="What should it say?">
</section>

<br><br>

<section class="section">
  <h3>Quantity</h3>
  <div class="quantity">
    <button onclick="changeQty(-1)">-</button>
    <span id="qty">1</span>
    <button onclick="changeQty(1)">+</button>
  </div>
</section>

<br><br>

<section class="section preview-box">
  <p id="previewText">Nothing selected</p>
  <h3 id="previewPrice">₦0</h3>
  <button onclick="addToCart()">Add to Order</button>
</section>

<script src="cart.js"></script>
<script src="balloon.js"></script>

</body>
</html>
